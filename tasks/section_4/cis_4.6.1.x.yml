---

- name: "4.6.1.1 | PATCH | Ensure password expiration is 365 days or less"
  when: amzn2023cis_rule_4_6_1_1
  tags:
      - level1-server
      - patch
      - password
      - rule_4.6.1.1
      - NIST800-53R5_CM-1
      - NIST800-53R5_CM-2
      - NIST800-53R5_CM-6
      - NIST800-53R5_CM-7
      - NIST800-53R5_IA-5
  block:
      - name: "4.6.1.1 | PATCH | Ensure password expiration is 365 days or less"
        ansible.builtin.lineinfile:
            path: /etc/login.defs
            regexp: '^PASS_MAX_DAYS'
            line: "PASS_MAX_DAYS {{ amzn2023cis_pass['max_days'] }}"

      - name: "4.6.1.1 | AUDIT | Ensure password expiration is 365 days or less | Get existing users PASS_MAX_DAYS"
        ansible.builtin.shell: "awk -F: '(/^[^:]+:[^!*]/ && ($5> {{ amzn2023cis_pass['max_days'] }} || $5< {{ amzn2023cis_pass['max_days'] }} || $5 == -1)){print $1}' /etc/shadow"
        changed_when: false
        failed_when: false
        register: discovered_max_days

      - name: "4.6.1.1 | FILTER | Filter discovered users to exclude sudo NOPASSWD exceptions and non-interactive users"
        ansible.builtin.set_fact:
          amzn2023cis_max_days_users: "{{ discovered_max_days.stdout_lines | intersect(prelim_interactive_usernames.stdout | default([])) | difference(amzn2023cis_sudo_nopasswd_exceptions | default([])) }}"
        when: discovered_max_days.stdout_lines is defined

      - name: "4.6.1.1 | PATCH | Ensure password expiration is 365 days or less | Set existing users PASS_MAX_DAYS"
        when:
          - amzn2023cis_max_days_users | length > 0
          - amzn2023cis_force_user_maxdays
        ansible.builtin.user:
          name: "{{ item }}"
          password_expire_max: "{{ amzn2023cis_pass['max_days'] }}"
        loop: "{{ amzn2023cis_max_days_users }}"

- name: "4.6.1.2 | PATCH | Ensure minimum days between password changes is configured"
  when: amzn2023cis_rule_4_6_1_2
  tags:
      - level1-server
      - patch
      - password
      - rule_4.6.1.2
      - NIST800-53R5_CM-1
      - NIST800-53R5_CM-2
      - NIST800-53R5_CM-6
      - NIST800-53R5_CM-7
      - NIST800-53R5_IA-5
  block:
      - name: "4.6.1.2 | PATCH | Ensure minimum days between password changes is configured | set login.defs"
        ansible.builtin.lineinfile:
            path: /etc/login.defs
            regexp: '^PASS_MIN_DAYS'
            line: "PASS_MIN_DAYS {{ amzn2023cis_pass['min_days'] }}"

      - name: "4.6.1.2 | AUDIT | Ensure minimum days between password changes is configured | Get existing users PASS_MIN_DAYS"
        ansible.builtin.shell: "awk -F: '/^[^:]+:[^!*]/ && $4< {{ amzn2023cis_pass['min_days'] }} {print $1}' /etc/shadow"
        changed_when: false
        failed_when: false
        register: discovered_min_days

      - name: "4.6.1.2 | FILTER | Filter discovered users to exclude sudo NOPASSWD exceptions and non-interactive users"
        ansible.builtin.set_fact:
          amzn2023cis_min_days_users: "{{ discovered_min_days.stdout_lines | intersect(prelim_interactive_usernames.stdout | default([])) | difference(amzn2023cis_sudo_nopasswd_exceptions | default([])) }}"
        when: discovered_min_days.stdout_lines is defined

        - name: "4.6.1.2 | PATCH | Ensure minimum days between password changes is configured | Set existing users PASS_MIN_DAYS"
        when:
          - amzn2023cis_min_days_users | length > 0
          - amzn2023cis_force_user_mindays
        ansible.builtin.user:
          name: "{{ item }}"
          password_expire_min: "{{ amzn2023cis_pass['min_days'] }}"
        loop: "{{ amzn2023cis_min_days_users }}"

- name: "4.6.1.3 | PATCH | Ensure password expiration warning days is 7 or more"
  when: amzn2023cis_rule_4_6_1_3
  tags:
      - level1-server
      - patch
      - password
      - rule_4.6.1.3
      - NIST800-53R5_CM-1
      - NIST800-53R5_CM-2
      - NIST800-53R5_CM-6
      - NIST800-53R5_CM-7
      - NIST800-53R5_IA-5
  block:
      - name: "4.6.1.3 | PATCH | Ensure password expiration warning days is 7 or more | set login.defs"
        ansible.builtin.lineinfile:
            path: /etc/login.defs
            regexp: '^PASS_WARN_AGE'
            line: "PASS_WARN_AGE {{ amzn2023cis_pass['warn_age'] }}"

      - name: "4.6.1.3 | AUDIT | Ensure password expiration warning days is 7 or more | Get existing users WARN_DAYS"
        ansible.builtin.shell: "awk -F: '/^[^:]+:[^!*]/ && $6< {{ amzn2023cis_pass['warn_age'] }} {print $1}' /etc/shadow"
        changed_when: false
        failed_when: false
        register: discovered_warn_days

      - name: "4.6.1.3 | FILTER | Filter discovered users to exclude sudo NOPASSWD exceptions and non-interactive users"
        ansible.builtin.set_fact:
          amzn2023cis_warn_days_users: "{{ discovered_warn_days.stdout_lines | intersect(prelim_interactive_usernames.stdout | default([])) | difference(amzn2023cis_sudo_nopasswd_exceptions | default([])) }}"
        when: discovered_warn_days.stdout_lines is defined

      - name: "4.6.1.3 | PATCH | Ensure password expiration warning days is 7 or more | Set existing users WARN_DAYS"
        when:
            - amzn2023cis_warn_days_users | length > 0
            - amzn2023cis_force_user_warnage
        ansible.builtin.command: "chage --warndays {{ amzn2023cis_pass['warn_age'] }} {{ item }}"
        changed_when: true
        loop: "{{ amzn2023cis_warn_days_users }}"

- name: "4.6.1.4 | PATCH | Ensure inactive password lock is 30 days or less"
  when: amzn2023cis_rule_4_6_1_4
  tags:
      - level1-server
      - patch
      - password
      - rule_4.6.1.4
      - NIST800-53R5_CM-1
      - NIST800-53R5_CM-2
      - NIST800-53R5_CM-6
      - NIST800-53R5_CM-7
      - NIST800-53R5_IA-5
  block:
      - name: "4.6.1.4 | AUDIT | Ensure inactive password lock is 30 days or less | Check current settings"
        ansible.builtin.shell: useradd -D | grep INACTIVE={{ amzn2023cis_inactivelock.lock_days }} | cut -f2 -d=
        changed_when: false
        failed_when: false
        check_mode: false
        register: discovered_inactive_settings

      - name: "4.6.1.4 | PATCH | Ensure inactive password lock is 30 days or less | Set default inactive setting"
        ansible.builtin.command: useradd -D -f {{ amzn2023cis_inactivelock.lock_days }}
        changed_when: true
        when: discovered_inactive_settings.stdout | length == 0

      - name: "4.6.1.4 | AUDIT | Ensure inactive password lock is 30 days or less | Getting user list"
        ansible.builtin.shell: "awk -F: '/^[^#:]+:[^\\!\\*:]*:[^:]*:[^:]*:[^:]*:[^:]*:(\\s*|-1|3[1-9]|[4-9][0-9]|[1-9][0-9][0-9]+):[^:]*:[^:]*\\s*$/ {print $1}' /etc/shadow"
        changed_when: false
        check_mode: false
        register: discovered_user_list

      - name: "4.6.1.4 | FILTER | Filter discovered users to exclude sudo NOPASSWD exceptions"
        ansible.builtin.set_fact:
          amzn2023cis_inactive_users: "{{ discovered_user_list.stdout_lines | difference(amzn2023cis_sudo_nopasswd_exceptions | default([])) }}"
        when: discovered_user_list.stdout_lines is defined

      - name: "4.6.1.4 | PATCH | Ensure inactive password lock is 30 days or less | Apply Inactive setting to existing accounts"
        when: amzn2023cis_inactive_users | length > 0
        ansible.builtin.command: chage --inactive {{ amzn2023cis_inactivelock.lock_days }} "{{ item }}"
        changed_when: true
        loop: "{{ amzn2023cis_inactive_users }}"

- name: "4.6.1.5 | PATCH | Ensure all users last password change date is in the past"
  when: amzn2023cis_rule_4_6_1_5
  tags:
      - level1-server
      - patch
      - rule_4.6.1.5
      - NIST800-53R5_CM-1
      - NIST800-53R5_CM-2
      - NIST800-53R5_CM-6
      - NIST800-53R5_CM-7
      - NIST800-53R5_IA-5
  vars:
      warn_control_id: '4.6.1.5'
  block:
      - name: "4.6.1.5 | AUDIT | Ensure all users last password change date is in the past | Get current date in Unix Time"
        ansible.builtin.command: echo $(($(date --utc --date "$1" +%s)/86400))
        changed_when: false
        failed_when: false
        check_mode: false
        register: discovered_currentut

      - name: "4.6.1.5 | AUDIT | Ensure all users last password change date is in the past | Get list of users with last changed pw date in the future"
        ansible.builtin.shell: "cat /etc/shadow | awk -F: '{if($3>{{ discovered_currentut.stdout }})print$1}'"
        changed_when: false
        failed_when: false
        check_mode: false
        register: discovered_user_list

      - name: "4.6.1.5 | FILTER | Filter discovered users to exclude sudo NOPASSWD exceptions"
        ansible.builtin.set_fact:
          amzn2023cis_futurepw_users: "{{ discovered_user_list.stdout_lines | difference(amzn2023cis_sudo_nopasswd_exceptions | default([])) }}"
        when: discovered_user_list.stdout_lines is defined

      - name: "4.6.1.5 | AUDIT | Ensure all users last password change date is in the past | Alert on accounts with pw change in the future"
        when:
          - amzn2023cis_futurepw_users | length > 0
          - not amzn2023cis_futurepwchgdate_autofix
        ansible.builtin.debug:
          msg: "Warning!! The following accounts have the last PW change date in the future: {{ amzn2023cis_futurepw_users }}"

      - name: "4.6.1.5 | AUDIT | Ensure all users last password change date is in the past | warning count"
        when:
          - amzn2023cis_futurepw_users | length > 0
          - not amzn2023cis_futurepwchgdate_autofix
        ansible.builtin.import_tasks:
          file: warning_facts.yml

      - name: "4.6.1.5 | PATCH | Ensure all users last password change date is in the past | Fix accounts with pw change in the future"
        when:
            - amzn2023cis_futurepw_users | length > 0
            - amzn2023cis_futurepwchgdate_autofix
        ansible.builtin.command: passwd --expire {{ item }}
        changed_when: true
        loop: "{{ amzn2023cis_futurepw_users }}"
